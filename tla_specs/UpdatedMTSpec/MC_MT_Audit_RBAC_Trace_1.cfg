SPECIFICATION TraceBehavior

CONSTANTS
  TenantGroups <- ConstTenantGroups
  PlatformGroups <- ConstPlatformGroups
  Tenants <- ConstTenants
  Namespaces <- ConstNamespaces
  RBNames <- ConstRBNames
  CRBNames <- ConstCRBNames
  DefaultClusterRoleNames <- ConstDefaultClusterRoleNames
  CustomClusterRoleNames <- ConstCustomClusterRoleNames
  Permissions <- ConstPermissions
  PermissionTiers <- ConstPermissionTiers
  NoTenant <- ConstNoTenant
  GroupTenantMap <- ConstGroupTenantMap
  DefaultClusterRolePermMap <- ConstDefaultClusterRolePermMap

CHECK_DEADLOCK 
    FALSE

(* We do not check invariants in the trace spec. The reason is
* that audit logs may contain violations that we want to record
* so future runs contain the actual cluster state, even if it is not
* "correct".
*)    

INVARIANT
    BaseInv
