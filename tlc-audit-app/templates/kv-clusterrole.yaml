apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.kv.serviceAccountName | default .Values.kv.name }}-reader
  labels:
    app: {{ .Values.kv.name }}
rules:
- apiGroups: [""]
  resources:
    - namespaces
  verbs:
    - get
    - list
- apiGroups: ["rbac.authorization.k8s.io"]
  resources:
    - clusterroles
    - clusterrolebindings
    - roles
    - rolebindings
    - namespaces
  verbs:
    - get
    - list