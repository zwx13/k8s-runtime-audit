apiVersion: v1
kind: PersistentVolume
metadata:
  name: nats-local-pv
spec:
  capacity:
    storage: {{ .Values.natsPV.size }}
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: {{ .Values.natsPV.path }}
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - {{ .Values.natsPV.node | quote }}