apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-alerts
  labels:
    app: audit-alerts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-alerts
  template:
    metadata:
      labels:
        app: audit-alerts
    spec:
      containers:
      - name: audit-alerts
        image: zwx13/audit-python:dev
        imagePullPolicy: Always
        command: ["python3"]
        args: ["python_audit/alerts.py"]
        env:
          - name: NATS_URL
            value: "nats://nats:4222"
          - name: ALERTS_STREAM
            value: "MT_ALERTS"
          - name: ALERTS_SUBJ
            value: "audit.mt.alerts"
          - name: ALERTS_DUPLICATE_WINDOW
            value: "180"
          - name: ALERTS_RETENTION_SECONDS
            value: "2592000"
        readinessProbe:
          exec:
            command:
            - cat
            - /tmp/readyz
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          exec:
            command:
            - python3
            - -c
            - "import os, time; exit(0 if time.time() - os.path.getmtime('/tmp/livez') < 30 else 1)"
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
