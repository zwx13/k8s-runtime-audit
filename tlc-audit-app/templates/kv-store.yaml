apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-kv
  labels:
    app: audit-kv
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-kv
  template:
    metadata:
      labels:
        app: audit-kv
    spec:
      containers:
      - name: audit-kv
        image: zwx13/audit-python:dev
        imagePullPolicy: Always
        command: ["python3"]
        args: ["python_audit/mt_state_store.py"]
        env:
          - name: NATS_URL
            value: "nats://nats:4222"
          - name: STATE_KV
            value: "MT_STATE_STORE"
          - name: STORE_SUBJ
            value: "audit.mt.state.store"
          - name: MT_RETENTION_SECONDS
            value: "2592000"
        readinessProbe:
          exec:
            command:
            - cat
            - /tmp/readyz
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          exec:
            command:
            - python3
            - -c
            - "import os, time; exit(0 if time.time() - os.path.getmtime('/tmp/livez') < 30 else 1)"
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
